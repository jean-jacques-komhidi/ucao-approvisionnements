<!DOCTYPE html>
<html lang="fr" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}UCAO Approvisionnements{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ static('css/base.css') }}">
    {% block styles_extra %}{% endblock %}

    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>

    <div class="page-publique">
        <div class="theme-toggle-public">
            <button class="btn-theme btn-theme-flottant" id="btn-theme" type="button" title="Changer le theme">
                <i data-lucide="moon" class="theme-icone-clair"></i>
                <i data-lucide="sun" class="theme-icone-sombre"></i>
            </button>
        </div>

        <main class="contenu-public">
            {% block contenu %}{% endblock %}
        </main>
    </div>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="{{ static('js/base.js') }}"></script>
    {% block scripts_extra %}{% endblock %}
</body>
</html>
